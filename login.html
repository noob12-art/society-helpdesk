<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Login | Society Helpdesk
  </title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Custom CSS -->
  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

      <a
        class="navbar-brand"
        href="index.html"
      >
        Society Helpdesk
      </a>

    </div>

  </nav>

  <!-- Header -->
  <section class="page-header py-5 bg-light">

    <div class="container text-center">

      <h1 class="fw-bold mb-2">
        Login
      </h1>

      <p class="mb-0">
        Sign in to raise and track complaints.
      </p>

    </div>

  </section>

  <!-- Login Section -->
  <section class="py-5">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-6">

          <div class="card shadow border-0 p-4">

            <form id="loginForm">

              <!-- Email -->
              <div class="mb-3">

                <label
                  for="loginEmail"
                  class="form-label"
                >
                  Email Address
                </label>

                <input
                  type="email"
                  class="form-control"
                  id="loginEmail"
                  placeholder="Enter email"
                  required
                />

              </div>

              <!-- Password -->
              <div class="mb-3">

                <label
                  for="loginPassword"
                  class="form-label"
                >
                  Password
                </label>

                <input
                  type="password"
                  class="form-control"
                  id="loginPassword"
                  placeholder="Enter password"
                  required
                />

              </div>

              <!-- Role -->
              <div class="mb-3">

                <label
                  for="loginRole"
                  class="form-label"
                >
                  Login As
                </label>

                <select
                  class="form-select"
                  id="loginRole"
                >

                  <option value="resident">
                    Resident
                  </option>

                  <option value="admin">
                    Admin
                  </option>

                </select>

              </div>

              <!-- Message -->
              <div
                id="loginMessage"
                class="mb-3"
              >
              </div>

              <!-- Button -->
              <button
                type="submit"
                class="btn btn-primary w-100"
              >
                Login
              </button>

            </form>

            <!-- Signup Link -->
            <p class="mt-3 text-center mb-0">

              New user?

              <a href="sign-up.html">
                Create an account
              </a>

            </p>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer class="bg-dark text-light py-3">

    <div class="container text-center">

      <a
        href="index.html"
        class="text-light text-decoration-none"
      >
        Society Helpdesk
      </a>

    </div>

  </footer>

  <!-- Login Script -->
  <script>

    const loginForm =
      document.getElementById("loginForm");

    const loginMessage =
      document.getElementById("loginMessage");

    loginForm.addEventListener(
      "submit",
      function (e) {

        e.preventDefault();

        // Get values
        const email =
          document.getElementById("loginEmail")
          .value.trim();

        const password =
          document.getElementById("loginPassword")
          .value.trim();

        const role =
          document.getElementById("loginRole")
          .value;

        // Empty validation
        if (!email || !password) {

          loginMessage.innerHTML =
            `<div class="alert alert-danger">
              Please fill all fields.
            </div>`;

          return;
        }

        // Admin Login
        if (
          role === "admin" &&
          email === "admin@gmail.com"
        ) {

          loginMessage.innerHTML =
            `<div class="alert alert-success">
              Admin login successful!
            </div>`;

          setTimeout(() => {

            window.location.href =
              "admin.html";

          }, 1000);

        }

        // Resident Login
        else {

          loginMessage.innerHTML =
            `<div class="alert alert-success">
              Resident login successful!
            </div>`;

          setTimeout(() => {

            window.location.href =
              "dashboard.html";

          }, 1000);

        }

      }
    );

  </script>

</body>

</html>
