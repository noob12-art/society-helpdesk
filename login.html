<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Society Helpdesk</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        Society Helpdesk
      </a>
    </div>
  </nav>

  <!-- Header -->
  <section class="page-header py-5 bg-light text-center">
    <div class="container">
      <h1 class="fw-bold mb-2">
       Login 
      </h1>

      <p class="mb-0">
        Sign in to raise and track complaints.
      </p>
    </div>
  </section>

  <!-- Login Form -->
  <section class="py-5">
    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-6">

          <div class="card shadow border-0 p-4">

            <form id="loginForm">

              <!-- Email -->
              <div class="mb-3">

                <label
                  class="form-label"
                  for="loginEmail"
                >
                  Email Address
                </label>

                <input
                  type="email"
                  class="form-control"
                  id="loginEmail"
                  placeholder="Enter your email"
                  required
                />

              </div>

              <!-- Password -->
              <div class="mb-3">

                <label
                  class="form-label"
                  for="loginPassword"
                >
                  Password
                </label>

                <input
                  type="password"
                  class="form-control"
                  id="loginPassword"
                  placeholder="Enter your password"
                  required
                />

              </div>

              <!-- Role -->
              <div class="mb-3">

                <label
                  class="form-label"
                  for="loginRole"
                >
                  Login As
                </label>

                <select
                  class="form-select"
                  id="loginRole"
                >
                  <option value="resident">
                    Resident
                  </option>

                  <option value="admin">
                    Admin
                  </option>
                </select>

              </div>

              <!-- Message -->
              <div id="loginMessage" class="mb-3"></div>

              <!-- Button -->
              <button
                class="btn btn-primary w-100"
                type="submit"
              >
                Login
              </button>

            </form>

            <!-- Signup -->
            <p class="mt-3 mb-0 text-center">

              New user?

              <a href="sign-up.html">
                Create an account
              </a>

            </p>

            <!-- Demo Info -->
            <p class="mt-2 mb-0 text-center text-muted small">

              Demo Admin Login:
              <strong>admin@gmail.com</strong>

            </p>

          </div>

        </div>

      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-light text-center py-3">

    <div class="container">
      Society Helpdesk
    </div>

  </footer>

  <!-- Auth JS -->
  <script type="module" src="js/auth.js"></script>

</body>

</html>
