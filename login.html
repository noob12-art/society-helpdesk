<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Society Helpdesk</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Society Helpdesk</a>
      </div>
    </nav>

    <section class="page-header">
      <div class="container">
        <h1 class="fw-bold mb-2">Resident Login</h1>
        <p class="mb-0">Sign in to raise and track complaints.</p>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6">
            <div class="form-card">
              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label" for="loginEmail">Email address</label>
                  <input type="email" class="form-control" id="loginEmail" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="loginPassword">Password</label>
                  <input type="password" class="form-control" id="loginPassword" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="loginRole">Login as</label>
                  <select class="form-select" id="loginRole">
                    <option value="resident">Resident</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
                <div id="loginMessage" class="mb-3"></div>
                <button class="btn btn-primary w-100" type="submit">Login</button>
              </form>
              <p class="mt-3 mb-0 text-center">
                New user? <a href="sign-up.html">Create an account</a>
              </p>
              <p class="mt-2 mb-0 text-center small-muted">
                Demo admin login works with email containing <strong>admin</strong>.
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">Society Helpdesk</div>
    </footer>

    <script type="module" src="firebase/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
  </html>
