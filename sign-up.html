<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Society Helpdesk</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Society Helpdesk</a>
      </div>
    </nav>

    <section class="page-header">
      <div class="container">
        <h1 class="fw-bold mb-2">Create Resident Account</h1>
        <p class="mb-0">Register once and use the portal anytime.</p>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-7">
            <div class="form-card">
              <form id="signupForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label" for="fullName">Full name</label>
                    <input type="text" class="form-control" id="fullName" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="flatNumber">Flat number</label>
                    <input type="text" class="form-control" id="flatNumber" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="phoneNumber">Phone number</label>
                    <input type="tel" class="form-control" id="phoneNumber" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="signupEmail">Email address</label>
                    <input type="email" class="form-control" id="signupEmail" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="signupPassword">Password</label>
                    <input type="password" class="form-control" id="signupPassword" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="confirmPassword">Confirm password</label>
                    <input type="password" class="form-control" id="confirmPassword" required />
                  </div>
                </div>
                <div id="signupMessage" class="mt-3"></div>
                <button class="btn btn-success w-100 mt-3" type="submit">Create Account</button>
              </form>
              <p class="mt-3 mb-0 text-center">
                Already registered? <a href="login.html">Login here</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">Society Helpdesk</div>
    </footer>

    <script type="module" src="firebase/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
  </html>
