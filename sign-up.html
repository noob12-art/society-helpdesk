<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sign Up | Society Helpdesk</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

      <a class="navbar-brand" href="index.html">
        Society Helpdesk
      </a>

    </div>

  </nav>

  <!-- Header -->
  <section class="page-header">

    <div class="container">

      <h1 class="fw-bold mb-2">
        Create Resident Account
      </h1>

      <p class="mb-0">
        Register once and use the portal anytime.
      </p>

    </div>

  </section>

  <!-- Signup Form -->
  <section class="py-5">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-7">

          <div class="form-card">

            <form id="signupForm">

              <div class="row g-3">

                <!-- Full Name -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="fullName"
                  >
                    Full Name
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="fullName"
                    required
                  />

                </div>

                <!-- Flat Number -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="flatNumber"
                  >
                    Flat Number
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="flatNumber"
                    required
                  />

                </div>

                <!-- Phone -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="phoneNumber"
                  >
                    Phone Number
                  </label>

                  <input
                    type="tel"
                    class="form-control"
                    id="phoneNumber"
                    required
                  />

                </div>

                <!-- Email -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="signupEmail"
                  >
                    Email Address
                  </label>

                  <input
                    type="email"
                    class="form-control"
                    id="signupEmail"
                    required
                  />

                </div>

                <!-- Password -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="signupPassword"
                  >
                    Password
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="signupPassword"
                    required
                  />

                </div>

                <!-- Confirm Password -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="confirmPassword"
                  >
                    Confirm Password
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    required
                  />

                </div>

              </div>

              <!-- Message -->
              <div id="signupMessage" class="mt-3"></div>

              <!-- Button -->
              <button
                class="btn btn-success w-100 mt-3"
                type="submit"
              >
                Create Account
              </button>

            </form>

            <!-- Login Link -->
            <p class="mt-3 mb-0 text-center">

              Already registered?

              <a href="login.html">
                Login here
              </a>

            </p>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer class="footer">

    <div class="container text-center">
      Society Helpdesk
    </div>

  </footer>

  <!-- Validation Script -->
  <script>

    const signupForm =
      document.getElementById("signupForm");

    const signupMessage =
      document.getElementById("signupMessage");

    signupForm.addEventListener(
      "submit",
      function (e) {

        e.preventDefault();

        // Get values
        const fullName =
          document.getElementById("fullName")
          .value.trim();

        const flatNumber =
          document.getElementById("flatNumber")
          .value.trim();

        const phoneNumber =
          document.getElementById("phoneNumber")
          .value.trim();

        const email =
          document.getElementById("signupEmail")
          .value.trim();

        const password =
          document.getElementById("signupPassword")
          .value;

        const confirmPassword =
          document.getElementById("confirmPassword")
          .value;

        // Patterns
        const namePattern =
          /^[A-Za-z\s]{3,}$/;

        const flatPattern =
          /^[A-Za-z0-9\-\/]{1,10}$/;

        const phonePattern =
          /^[6-9]\d{9}$/;

        const emailPattern =
          /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        signupMessage.innerHTML = "";

        // Name validation
        if (!namePattern.test(fullName)) {

          signupMessage.innerHTML =
            `<div class="alert alert-danger">
              Enter valid full name.
            </div>`;

          return;
        }

        // Flat validation
        if (!flatPattern.test(flatNumber)) {

          signupMessage.innerHTML =
            `<div class="alert alert-danger">
              Enter valid flat number.
            </div>`;

          return;
        }

        // Phone validation
        if (!phonePattern.test(phoneNumber)) {

          signupMessage.innerHTML =
            `<div class="alert alert-danger">
              Enter valid phone number.
            </div>`;

          return;
        }

        // Email validation
        if (!emailPattern.test(email)) {

          signupMessage.innerHTML =
            `<div class="alert alert-danger">
              Enter valid email.
            </div>`;

          return;
        }

        // Password validation
        if (password.length < 6) {

          signupMessage.innerHTML =
            `<div class="alert alert-danger">
              Password must be 6 characters.
            </div>`;

          return;
        }

        // Match validation
        if (password !== confirmPassword) {

          signupMessage.innerHTML =
            `<div class="alert alert-danger">
              Passwords do not match.
            </div>`;

          return;
        }

        // Success
        signupMessage.innerHTML =
          `<div class="alert alert-success">
            Account created successfully!
          </div>`;

        // Redirect
        setTimeout(() => {

          window.location.href =
            "dashboard.html";

        }, 1000);

      }
    );

  </script>

</body>

</html>
