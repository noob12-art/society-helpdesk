<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Raise Complaint | Society Helpdesk</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

      <a class="navbar-brand" href="index.html">
        Society Helpdesk
      </a>

      <div class="d-flex gap-2">

        <a class="btn btn-primary btn-sm" href="login.html">
          Login
        </a>

      </div>

    </div>

  </nav>

  <!-- Header -->
  <section class="page-header">

    <div class="container">

      <h1 class="fw-bold mb-2">
        Raise a Complaint
      </h1>

      <p class="mb-0">
        Submit your issue in a few simple steps.
      </p>

    </div>

  </section>

  <!-- Main Section -->
  <section class="py-5">

    <div class="container">

      <div class="row g-4">

        <!-- Complaint Form -->
        <div class="col-lg-8">

          <div class="form-card">

            <form id="complaintForm">

              <div class="row g-3">

                <!-- Resident Name -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="complaintName"
                  >
                    Resident Name
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="complaintName"
                    required
                  />

                </div>

                <!-- Email -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="complaintEmail"
                  >
                    Email Address
                  </label>

                  <input
                    type="email"
                    class="form-control"
                    id="complaintEmail"
                    required
                  />

                </div>

                <!-- Flat Number -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="flatNo"
                  >
                    Flat Number
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="flatNo"
                    required
                  />

                </div>

                <!-- Category -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="complaintCategory"
                  >
                    Category
                  </label>

                  <select
                    id="complaintCategory"
                    class="form-select"
                    required
                  >

                    <option value="">
                      Choose a category
                    </option>

                    <option value="Water Supply">
                      Water Supply
                    </option>

                    <option value="Electricity">
                      Electricity
                    </option>

                    <option value="Cleanliness">
                      Cleanliness
                    </option>

                    <option value="Parking">
                      Parking
                    </option>

                    <option value="Security">
                      Security
                    </option>

                    <option value="Lift">
                      Lift
                    </option>

                    <option value="Maintenance">
                      Maintenance
                    </option>

                  </select>

                </div>

                <!-- Priority -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="complaintPriority"
                  >
                    Priority
                  </label>

                  <select
                    id="complaintPriority"
                    class="form-select"
                    required
                  >

                    <option value="Low">
                      Low
                    </option>

                    <option value="Medium" selected>
                      Medium
                    </option>

                    <option value="High">
                      High
                    </option>

                  </select>

                </div>

                <!-- Location -->
                <div class="col-md-6">

                  <label
                    class="form-label"
                    for="complaintLocation"
                  >
                    Location / Block
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="complaintLocation"
                    placeholder="Block A, 3rd Floor"
                  />

                </div>

                <!-- Complaint Title -->
                <div class="col-12">

                  <label
                    class="form-label"
                    for="complaintTitle"
                  >
                    Complaint Title
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="complaintTitle"
                    required
                  />

                </div>

                <!-- Description -->
                <div class="col-12">

                  <label
                    class="form-label"
                    for="complaintDescription"
                  >
                    Description
                  </label>

                  <textarea
                    class="form-control"
                    id="complaintDescription"
                    rows="5"
                    placeholder="Describe the issue clearly"
                    required
                  ></textarea>

                </div>

              </div>

              <!-- Message -->
              <div id="complaintMessage" class="mt-3"></div>

              <!-- Button -->
              <button
                type="submit"
                class="btn btn-primary w-100 mt-3"
              >
                Submit Complaint
              </button>

            </form>

          </div>

        </div>

        <!-- Info Section -->
        <div class="col-lg-4">

          <div class="info-card mb-4">

            <h3 class="h5 mb-3">
              Before submitting
            </h3>

            <ul class="mb-0">

              <li>
                Choose the correct complaint category.
              </li>

              <li>
                Write the location clearly for faster resolution.
              </li>

              <li>
                Explain the issue in simple words.
              </li>

            </ul>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer class="footer">

    <div class="container text-center">

      <a
        href="index.html"
        class="text-decoration-none text-light"
      >
        Society Helpdesk
      </a>

    </div>

  </footer>

  <!-- Scripts -->
  <script
    type="module"
    src="firebase/firebase-config.js"
  ></script>

  <script
    type="module"
    src="js/complaint.js"
  ></script>

</body>

</html>
