<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Society Helpdesk</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Society Helpdesk</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" href="raise.html">Raise Complaint</a>
        <a
  class="btn btn-danger btn-sm"
  href="index.html"
>
  Logout
</a>  
        </div>
      </div>
    </nav>

    <section class="page-header">
      <div class="container">
        <h1 class="fw-bold mb-2">Resident Dashboard</h1>
        <p class="mb-0">Track your submitted complaints and see recent updates.</p>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <div class="row g-4 mb-4">
          <div class="col-md-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon"><i class="bi bi-collection"></i></div>
              <h3 class="h6 text-uppercase text-muted">Total Complaints</h3>
              <p class="display-6 mb-0" id="totalCount">0</p>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon"><i class="bi bi-hourglass-split"></i></div>
              <h3 class="h6 text-uppercase text-muted">Received</h3>
              <p class="display-6 mb-0" id="receivedCount">0</p>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon"><i class="bi bi-tools"></i></div>
              <h3 class="h6 text-uppercase text-muted">In Progress</h3>
              <p class="display-6 mb-0" id="progressCount">0</p>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="stat-card">
              <div class="stat-icon"><i class="bi bi-check2-circle"></i></div>
              <h3 class="h6 text-uppercase text-muted">Resolved</h3>
              <p class="display-6 mb-0" id="resolvedCount">0</p>
            </div>
          </div>
        </div>

        <div class="table-card">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
            <div>
              <h2 class="h4 mb-1">My Complaints</h2>
              <p class="small-muted mb-0">Only the current resident's complaints are shown here.</p>
            </div>
            <input
              type="search"
              id="dashboardSearch"
              class="form-control"
              placeholder="Search by title, category, or complaint ID"
              style="max-width: 360px"
            />
          </div>
          <div id="dashboardTableWrap" class="table-responsive"></div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">Society Helpdesk</div>
    </footer>

    <script type="module" src="firebase/firebase-config.js"></script>
    <script type="module" src="js/complaint.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
  </html>
